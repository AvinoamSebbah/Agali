name: 🕐 Scrape & Import - Every 12h

on:
  schedule:
    # 06h00 et 18h00 UTC (= 08h00 et 20h00 heure Israël)
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 Mode de lancement'
        type: choice
        required: true
        default: 'all'
        options:
          - 'all'           # Tout scraper + tout importer
          - 'stores_only'   # Uniquement les magasins (rapide, ~5min)
          - 'prices_only'   # Prix seulement (PRICE_FILE + PRICE_FULL_FILE)
          - 'promos_only'   # Promos seulement (PROMO_FILE + PROMO_FULL_FILE)
          - 'custom'        # Paramètres personnalisés ci-dessous
      scrapers:
        description: '🏪 [custom] Magasins (ex: COFIX,BAREKET - vide=TOUS)'
        type: string
        default: ''
      file_types:
        description: '📄 [custom] Types (STORE_FILE,PRICE_FILE,PRICE_FULL_FILE,PROMO_FILE,PROMO_FULL_FILE - vide=TOUS)'
        type: string
        default: ''
      limit:
        description: '⚡ [custom] Limite fichiers par magasin (vide=TOUT)'
        type: string
        default: ''
      skip_import:
        description: '⏩ Scraper uniquement, ne pas importer en BDD'
        type: boolean
        default: false

# ════════════════════════════════════════════════════════════════
# 175 jobs parallèles (35 magasins × 5 types de fichiers)
# Chaque job : scrape UN type de fichier pour UN magasin
#              puis importe immédiatement dans la DB
# ════════════════════════════════════════════════════════════════
jobs:
  scrape-and-import:
    name: ${{ matrix.scraper }} / ${{ matrix.file_type }}
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max (limite absolue GitHub)
    strategy:
      fail-fast: false     # Si 1 magasin plante, les autres continuent
      matrix:
        scraper:
          - BAREKET
          - YAYNO_BITAN_AND_CARREFOUR
          - COFIX
          - CITY_MARKET_KIRYATGAT
          - CITY_MARKET_SHOPS
          - DOR_ALON
          - GOOD_PHARM
          - HAZI_HINAM
          - HET_COHEN
          - KESHET
          - KING_STORE
          - MAAYAN_2000
          - MAHSANI_ASHUK
          - NETIV_HASED
          - MESHMAT_YOSEF_1
          - MESHMAT_YOSEF_2
          - OSHER_AD
          - POLIZER
          - RAMI_LEVY
          - SALACH_DABACH
          - SHEFA_BARCART_ASHEM
          - SHUFERSAL
          - SHUK_AHIR
          - STOP_MARKET
          - SUPER_PHARM
          - SUPER_YUDA
          - SUPER_SAPIR
          - FRESH_MARKET_AND_SUPER_DOSH
          - QUIK
          - TIV_TAAM
          - VICTORY
          - YELLOW
          - YOHANANOF
          - ZOL_VEBEGADOL
          - WOLT
        file_type:
          - STORE_FILE
          - PRICE_FILE
          - PRICE_FULL_FILE
          - PROMO_FILE
          - PROMO_FULL_FILE

    steps:
      # ── Décider si ce job doit tourner ─────────────────────────
      - name: 🧮 Check filters
        id: filters
        run: |
          MODE="${{ inputs.mode || 'all' }}"
          SCRAPER="${{ matrix.scraper }}"
          FILE_TYPE="${{ matrix.file_type }}"
          SHOULD_RUN="true"

          case "$MODE" in
            stores_only)
              [[ "$FILE_TYPE" != "STORE_FILE" ]] && SHOULD_RUN="false"
              ;;
            prices_only)
              [[ "$FILE_TYPE" != "PRICE_FILE" && "$FILE_TYPE" != "PRICE_FULL_FILE" ]] && SHOULD_RUN="false"
              ;;
            promos_only)
              [[ "$FILE_TYPE" != "PROMO_FILE" && "$FILE_TYPE" != "PROMO_FULL_FILE" ]] && SHOULD_RUN="false"
              ;;
            custom)
              CUSTOM_SCRAPERS="${{ inputs.scrapers }}"
              if [[ -n "$CUSTOM_SCRAPERS" ]]; then
                if ! echo ",$CUSTOM_SCRAPERS," | grep -q ",$SCRAPER,"; then
                  SHOULD_RUN="false"
                fi
              fi
              CUSTOM_FILE_TYPES="${{ inputs.file_types }}"
              if [[ -n "$CUSTOM_FILE_TYPES" && "$SHOULD_RUN" == "true" ]]; then
                if ! echo ",$CUSTOM_FILE_TYPES," | grep -q ",$FILE_TYPE,"; then
                  SHOULD_RUN="false"
                fi
              fi
              ;;
          esac

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "ℹ️ [$SCRAPER/$FILE_TYPE] mode=$MODE → should_run=$SHOULD_RUN"

      # ── Setup ───────────────────────────────────────────────────
      - name: 📥 Checkout
        if: steps.filters.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        if: steps.filters.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        if: steps.filters.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Setup .env
        if: steps.filters.outputs.should_run == 'true'
        run: echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env

      - name: 🔄 Prisma generate
        if: steps.filters.outputs.should_run == 'true'
        run: python -m prisma generate

      # ── SCRAPING + IMPORT PROGRESSIF ────────────────────────────
      # L'import tourne en PARALLÈLE du scraping toutes les 20min
      # → Même si le job timeout à 6h, les fichiers déjà téléchargés sont importés !
      - name: 🌐 Scrape + 🗄️ Import progressif ${{ matrix.scraper }} / ${{ matrix.file_type }}
        if: steps.filters.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENABLED_SCRAPERS: ${{ matrix.scraper }}
          ENABLED_FILE_TYPES: ${{ matrix.file_type }}
          NUMBER_OF_PROCESSES: "1"
          LIMIT: ${{ inputs.limit }}
          SKIP_IMPORT: ${{ inputs.skip_import }}
        run: |
          # Détermine le type d'import selon le file_type
          FILE_TYPE="${{ matrix.file_type }}"
          case "$FILE_TYPE" in
            STORE_FILE)       IMPORT_TYPES="stores" ;;
            PRICE_FILE)       IMPORT_TYPES="price"  ;;
            PRICE_FULL_FILE)  IMPORT_TYPES="price"  ;;
            PROMO_FILE)       IMPORT_TYPES="promo"  ;;
            PROMO_FULL_FILE)  IMPORT_TYPES="promo"  ;;
            *)                IMPORT_TYPES="stores promo price" ;;
          esac

          # ── Lance un import en arrière-plan toutes les 20 minutes ──
          if [ "$SKIP_IMPORT" != "true" ]; then
            (
              while true; do
                sleep 1200  # 20 minutes
                XML_COUNT=$(find dumps/ -name "*.xml" 2>/dev/null | wc -l)
                if [ "$XML_COUNT" -gt 0 ]; then
                  echo ""
                  echo "⏰ [$(date)] Import intermédiaire ($XML_COUNT XML files trouvés)..."
                  python import_xml_to_db.py $IMPORT_TYPES --workers 4 2>&1 | tail -10
                  echo "✅ Import intermédiaire terminé"
                fi
              done
            ) &
            IMPORT_BG_PID=$!
            echo "🔄 Import background PID: $IMPORT_BG_PID"
          fi

          # ── Scraping principal ─────────────────────────────────────
          echo "🕐 Scraping [${{ matrix.scraper }}/${{ matrix.file_type }}]: $(date)"
          python main.py
          echo "✅ Scraping done: $(date)"

          # ── Arrêter le process background ──────────────────────────
          if [ "$SKIP_IMPORT" != "true" ] && [ -n "$IMPORT_BG_PID" ]; then
            kill $IMPORT_BG_PID 2>/dev/null || true
          fi

          # ── Import final (capture tout ce qui reste) ───────────────
          if [ "$SKIP_IMPORT" != "true" ]; then
            XML_COUNT=$(find dumps/ -name "*.xml" 2>/dev/null | wc -l)
            if [ "$XML_COUNT" -gt 0 ]; then
              echo ""
              echo "🗄️ Import final ($XML_COUNT XML files): $(date)"
              python import_xml_to_db.py $IMPORT_TYPES --workers 4
              echo "✅ Import final terminé: $(date)"
            else
              echo "⏭️ Aucun XML à importer"
            fi
          else
            echo "⏩ Import skippé (skip_import=true)"
          fi

  # ════════════════════════════════════════════════════════════════
  # 📧 Notification email — lancé SEULEMENT si des jobs ont échoué
  # ════════════════════════════════════════════════════════════════
  notify-on-failure:
    name: 📧 Notification erreurs
    runs-on: ubuntu-latest
    needs: scrape-and-import
    # Se lance uniquement si AU MOINS 1 job du matrix a échoué
    if: failure()
    steps:
      - name: 📋 Résumé des erreurs
        id: summary
        run: |
          echo "FAILED_JOBS=${{ toJson(needs.scrape-and-import.result) }}" >> $GITHUB_ENV
          echo "RUN_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
          echo "TRIGGER=${{ github.event_name == 'schedule' && 'Planifié (cron)' || 'Manuel' }}" >> $GITHUB_ENV

      - name: 📧 Envoyer email d'erreur
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: "Agali Scraper <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ [Agali] Échec du scraping — ${{ github.run_id }}"
          html_body: |
            <h2>⚠️ Des jobs ont échoué dans le workflow Agali Scraper</h2>
            <table border="1" cellpadding="8" style="border-collapse:collapse">
              <tr><td><b>🔗 Voir les logs</b></td><td><a href="${{ env.RUN_URL }}">${{ env.RUN_URL }}</a></td></tr>
              <tr><td><b>📅 Date</b></td><td>${{ github.run_started_at }}</td></tr>
              <tr><td><b>🔧 Déclencheur</b></td><td>${{ env.TRIGGER }}</td></tr>
              <tr><td><b>📦 Commit</b></td><td>${{ github.sha }}</td></tr>
            </table>
            <br>
            <p>Ouvre le lien ci-dessus pour voir quels jobs ont échoué et pourquoi.</p>
            <p><i>Ce mail est envoyé uniquement en cas d'erreur.</i></p>

