version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agali-postgres
    restart: always
    environment:
      POSTGRES_USER: agali
      POSTGRES_PASSWORD: agali123
      POSTGRES_DB: agali_scrapper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agali-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agali-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agali.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - agali-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:

networks:
  agali-network:
    driver: bridge
